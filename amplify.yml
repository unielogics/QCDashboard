version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm@10.33.3
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm build
  artifacts:
    # Next.js SSR — Amplify reads .next and runs the SSR worker
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
